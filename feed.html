<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Sainiwalaa Reels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    <style>
        body, html { background: #000; height: 100vh; overflow: hidden; }
        #feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed::-webkit-scrollbar { display: none; }
        .reel { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { height: 100%; width: 100%; object-fit: cover; }
        .ui { position: absolute; bottom: 30px; left: 15px; right: 15px; z-index: 10; }
        .shop { background: #fff; color: #000; padding: 12px; border-radius: 8px; font-weight: 800; display: block; text-align: center; margin-top: 10px; }
        #tap { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>
    <div id="tap" onclick="this.style.display='none'; load()">
        <p class="font-bold tracking-widest text-white text-lg">TAP TO WATCH REELS</p>
    </div>
    <div id="feed"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        function load() {
            db.ref('posts').once('value').then(snap => {
                const data = snap.val(); if(!data) return;
                const container = document.getElementById('feed');
                Object.values(data).reverse().forEach(p => {
                    container.innerHTML += `
                        <div class="reel" onclick="const v=this.querySelector('video'); v.muted=!v.muted;">
                            <video loop playsinline muted><source src="${p.mediaUrl}" type="video/mp4"></video>
                            <div class="ui">
                                <span class="bg-pink-600 px-3 py-1 rounded font-bold text-sm">₹${p.price}</span>
                                <h3 class="font-bold text-lg mt-2">@${p.influencerName}</h3>
                                <p class="text-sm opacity-80 mb-2">${p.productName}</p>
                                <a href="${p.buyLink}" target="_blank" class="shop" onclick="event.stopPropagation()">SHOP NOW</a>
                            </div>
                        </div>`;
                });
                startObs();
            });
        }
        function startObs() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => { const v = e.target.querySelector('video'); if(e.isIntersecting){v.play();}else{v.pause();} });
            }, {threshold: 0.8});
            document.querySelectorAll('.reel').forEach(r => obs.observe(r));
        }
    </script>
</body>
</html>
