<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>Sainiwalaa | Public Feed</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            background: #000; height: 100vh; width: 100vw; 
            overflow: hidden; color: #fff; font-family: sans-serif;
        }

        #reels-feed {
            height: 100vh; width: 100%;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        #reels-feed::-webkit-scrollbar { display: none; }

        /* 9:16 Aspect Ratio Container */
        .reel-card {
            height: 100vh; width: 100%; scroll-snap-align: start;
            position: relative; background: #000;
            display: flex; align-items: center; justify-content: center;
        }

        video { 
            height: 100%; width: 100%; 
            object-fit: cover; /* यह वीडियो को 9:16 में फिट करेगा */
        }

        /* Side Action Buttons (Insta Look) */
        .side-actions {
            position: absolute; right: 15px; bottom: 120px;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            z-index: 40;
        }
        .action-btn { text-align: center; cursor: pointer; }
        .action-btn i { font-size: 28px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .action-btn span { font-size: 12px; display: block; margin-top: 4px; font-weight: bold; }

        /* Bottom Info (Insta Look) */
        .bottom-details {
            position: absolute; bottom: 30px; left: 15px; right: 80px;
            z-index: 30; text-shadow: 0 1px 5px rgba(0,0,0,0.8);
        }
        .user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .user-row img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #fff; }
        
        .product-name { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .description { font-size: 13px; opacity: 0.9; line-clamp: 2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Price Badge */
        .insta-price {
            background: #ff0050; color: #fff; padding: 5px 12px; border-radius: 4px;
            font-weight: 900; font-size: 14px; display: inline-block; margin-bottom: 10px;
        }

        /* Shop Now Button */
        .shop-now {
            background: #fff; color: #000; padding: 10px 20px; border-radius: 8px;
            font-weight: bold; text-decoration: none; display: inline-flex;
            align-items: center; gap: 8px; font-size: 14px; margin-top: 10px;
        }

        #tap-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 100; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="tap-overlay" onclick="startApp()">
        <i class="fa-solid fa-circle-play text-7xl text-pink-500 mb-4"></i>
        <p class="font-bold tracking-widest text-lg">WATCH LATEST REELS</p>
    </div>

    <div id="reels-feed"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function startApp() {
            document.getElementById('tap-overlay').style.display = 'none';
            fetchReels();
        }

        async function fetchReels() {
            db.ref('posts').once('value').then(snap => {
                const data = snap.val();
                if(!data) return;

                const posts = Object.values(data).sort(() => Math.random() - 0.5);
                const container = document.getElementById('reels-feed');

                posts.forEach(p => {
                    container.innerHTML += `
                        <div class="reel-card" onclick="toggleMute(this)">
                            <div class="side-actions">
                                <div class="action-btn" onclick="event.stopPropagation();">
                                    <i class="fa-solid fa-heart"></i>
                                    <span>Like</span>
                                </div>
                                <div class="action-btn" onclick="shareWhatsApp('${p.productName}', '${p.buyLink}')">
                                    <i class="fa-brands fa-whatsapp text-green-500"></i>
                                    <span>Send</span>
                                </div>
                                <div class="action-btn">
                                    <i class="fa-solid fa-share"></i>
                                    <span>Share</span>
                                </div>
                            </div>

                            <video class="rvid" loop playsinline muted>
                                <source src="${p.mediaUrl}" type="video/mp4">
                            </video>

                            <div class="bottom-details">
                                <div class="insta-price">₹${p.price}</div>
                                <div class="user-row">
                                    <img src="https://ui-avatars.com/api/?name=${p.influencerName || 'S'}&background=random" alt="user">
                                    <span class="font-bold">@${p.influencerInsta || 'sainiwalaa'}</span>
                                </div>
                                <div class="product-name">${p.productName}</div>
                                <p class="description">${p.description}</p>
                                <a href="${p.buyLink}" target="_blank" class="shop-now" onclick="event.stopPropagation();">
                                    <i class="fa-solid fa-cart-shopping"></i> SHOP NOW
                                </a>
                            </div>
                        </div>`;
                });
                initObserver();
            });
        }

        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        v.muted = false;
                        v.play().catch(() => {});
                    } else {
                        v.pause();
                    }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.reel-card').forEach(c => obs.observe(c));
        }

        function toggleMute(card) {
            const v = card.querySelector('video');
            v.muted = !v.muted;
            if(v.paused) v.play();
        }

        function shareWhatsApp(name, link) {
            event.stopPropagation();
            const text = `Hey! Check out this ${name}: ${link}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
        }
    </script>
</body>
</html>
