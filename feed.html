<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>Sainiwalaa | Reels</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            background: #000; height: 100vh; width: 100vw; 
            overflow: hidden; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Full Screen Feed */
        #reels-feed {
            height: 100vh; width: 100%;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        #reels-feed::-webkit-scrollbar { display: none; }

        .reel-card {
            height: 100vh; width: 100%; scroll-snap-align: start;
            position: relative; background: #000;
            display: flex; align-items: center; justify-content: center;
        }

        /* 9:16 Ratio Logic */
        video { 
            height: 100%; width: 100%; 
            object-fit: cover; /* असली रील जैसा फुल स्क्रीन */
        }

        /* Gradient Overlay for Text Readability */
        .bottom-gradient {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 30%;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 10; pointer-events: none;
        }

        /* User & Info Content */
        .reel-content {
            position: absolute; bottom: 20px; left: 16px; right: 16px;
            z-index: 20;
        }

        .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .user-info img { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid #fff; }
        .username { font-weight: 600; font-size: 14px; color: #fff; }

        .product-title { font-weight: 700; font-size: 16px; margin-bottom: 6px; display: block; }
        .description { 
            font-size: 13px; color: #efefef; line-height: 1.4;
            max-width: 85%; margin-bottom: 15px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        /* Floating Price Tag */
        .price-chip {
            display: inline-flex; align-items: center;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px);
            padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 14px;
            margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.2);
        }

        /* Action Link */
        .shop-btn {
            background: #fff; color: #000; width: 100%;
            padding: 12px; border-radius: 8px; font-weight: 700;
            text-align: center; text-decoration: none; display: block;
            font-size: 14px; transition: opacity 0.2s;
        }
        .shop-btn:active { opacity: 0.8; }

        /* Initial Tap Overlay */
        #tap-start {
            position: fixed; inset: 0; background: #000;
            z-index: 100; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="tap-start" onclick="startApp()">
        <div class="animate-pulse text-center">
            <i class="fa-solid fa-play text-5xl mb-4"></i>
            <p class="font-bold tracking-widest text-sm uppercase">Tap to Play Reels</p>
        </div>
    </div>

    <div id="reels-feed"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function startApp() {
            document.getElementById('tap-start').style.display = 'none';
            fetchReels();
        }

        async function fetchReels() {
            db.ref('posts').once('value').then(snap => {
                const data = snap.val();
                if(!data) return;

                const posts = Object.values(data).sort(() => Math.random() - 0.5);
                const container = document.getElementById('reels-feed');

                posts.forEach(p => {
                    container.innerHTML += `
                        <div class="reel-card" onclick="toggleMute(this)">
                            <video class="rvid" loop playsinline muted preload="auto">
                                <source src="${p.mediaUrl}" type="video/mp4">
                            </video>

                            <div class="bottom-gradient"></div>

                            <div class="reel-content">
                                <div class="price-chip">₹${p.price}</div>
                                
                                <div class="user-info">
                                    <img src="https://ui-avatars.com/api/?name=${p.influencerName || 'S'}&background=random" alt="user">
                                    <span class="username">${p.influencerName || 'sainiwalaa'}</span>
                                </div>

                                <h2 class="product-title">${p.productName}</h2>
                                <p class="description">${p.description || ''}</p>

                                <a href="${p.buyLink}" target="_blank" class="shop-btn" onclick="event.stopPropagation();">
                                    SHOP NOW
                                </a>
                            </div>
                        </div>`;
                });
                initObserver();
            });
        }

        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        v.muted = false;
                        v.play().catch(() => {});
                    } else {
                        v.pause();
                    }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.reel-card').forEach(c => obs.observe(c));
        }

        function toggleMute(card) {
            const v = card.querySelector('video');
            v.muted = !v.muted;
            if(v.paused) v.play();
        }
    </script>
</body>
</html>
