<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <title>Sainiwalaa Reels</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            background: #000; height: 100%; width: 100%; 
            overflow: hidden; color: #fff; position: fixed;
        }

        /* 9:16 Snap Container */
        #reels-feed {
            height: 100vh; width: 100vw;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        #reels-feed::-webkit-scrollbar { display: none; }

        .reel-card {
            height: 100vh; width: 100vw; scroll-snap-align: start;
            position: relative; overflow: hidden; background: #000;
        }

        /* Video Styling to force 9:16 */
        video { 
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; /* यह 16:9 वीडियो को भी 9:16 में क्रॉप करके फिट करेगा */
        }

        /* Shadow overlay for text */
        .overlay {
            position: absolute; inset: 0;
            background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,0) 100%);
            z-index: 10; pointer-events: none;
        }

        /* Content area */
        .content {
            position: absolute; bottom: 40px; left: 15px; right: 15px;
            z-index: 20; max-width: 80%;
        }

        .price-tag {
            background: #ff0050; color: #fff; padding: 4px 12px;
            border-radius: 5px; font-weight: 900; font-size: 14px;
            display: inline-block; margin-bottom: 10px;
        }

        .description {
            font-size: 14px; color: #eee; margin: 8px 0;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        .shop-btn {
            background: #fff; color: #000; padding: 12px 25px;
            border-radius: 10px; font-weight: 800; text-decoration: none;
            display: inline-block; margin-top: 10px; font-size: 14px;
        }

        /* Audio Indicator */
        .mute-indicator {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 40px; opacity: 0; transition: 0.3s; z-index: 30;
        }
    </style>
</head>
<body>

    <div id="start-screen" onclick="startReels()" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black cursor-pointer">
        <i class="fa-solid fa-circle-play text-7xl text-white mb-4"></i>
        <p class="font-bold tracking-widest text-white">TAP TO PLAY REELS</p>
    </div>

    <div id="reels-feed"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function startReels() {
            document.getElementById('start-screen').style.display = 'none';
            fetchData();
        }

        async function fetchData() {
            db.ref('posts').once('value').then(snap => {
                const data = snap.val();
                if(!data) return;
                
                const container = document.getElementById('reels-feed');
                const posts = Object.values(data).reverse(); // लेटेस्ट पहले

                posts.forEach(p => {
                    container.innerHTML += `
                        <div class="reel-card" onclick="handleTap(this)">
                            <video loop playsinline preload="auto">
                                <source src="${p.mediaUrl}" type="video/mp4">
                            </video>
                            <div class="overlay"></div>
                            <div class="mute-indicator"><i class="fa-solid fa-volume-high"></i></div>
                            <div class="content">
                                <div class="price-tag">₹${p.price}</div>
                                <h3 class="font-bold text-lg">@${p.influencerName}</h3>
                                <p class="description">${p.productName} - ${p.description}</p>
                                <a href="${p.buyLink}" target="_blank" class="shop-btn" onclick="event.stopPropagation()">SHOP NOW</a>
                            </div>
                        </div>`;
                });
                setupObserver();
            });
        }

        function setupObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play().catch(e => console.log("Auto-play blocked"));
                    } else {
                        video.pause();
                        video.currentTime = 0; // वीडियो रीसेट करें
                    }
                });
            }, { threshold: 0.8 });

            document.querySelectorAll('.reel-card').forEach(card => observer.observe(card));
        }

        function handleTap(card) {
            const video = card.querySelector('video');
            const icon = card.querySelector('.mute-indicator');
            
            // Toggle Mute
            video.muted = !video.muted;
            
            // Show Feedback Icon
            icon.innerHTML = video.muted ? '<i class="fa-solid fa-volume-xmark"></i>' : '<i class="fa-solid fa-volume-high"></i>';
            icon.style.opacity = '1';
            setTimeout(() => { icon.style.opacity = '0'; }, 600);
        }
    </script>
</body>
</html>
