<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sainiwalaa AI | Algorithm Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .nav-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            margin-top: 15px;
            border-radius: 15px;
            font-weight: 800;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-primary { background: #ff0050; color: white; } /* Insta Pink */
        .btn-secondary { background: #0095f6; color: white; } /* Insta Blue */
        .nav-btn:hover { transform: scale(1.02); filter: brightness(1.2); }
        
        .status-dot {
            height: 8px; width: 8px; background: #22c55e;
            border-radius: 50%; display: inline-block;
            margin-right: 5px; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="mb-8">
            <div class="w-20 h-20 bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-600 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg">
                <i class="fa-solid fa-bolt-lightning text-4xl text-white"></i>
            </div>
            <h1 class="text-3xl font-black italic tracking-tighter">SAINIWALAA <span class="text-pink-500">AI</span></h1>
            <div class="text-[10px] text-gray-400 mt-1 uppercase tracking-widest">
                <span class="status-dot"></span> System Live: Algorithm v2.4
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-8 text-left">
            <div class="bg-white/5 p-3 rounded-xl border border-white/10">
                <p class="text-[10px] text-gray-500 uppercase">Traffic Mode</p>
                <p class="text-xs font-bold">Public Feed</p>
            </div>
            <div class="bg-white/5 p-3 rounded-xl border border-white/10">
                <p class="text-[10px] text-gray-500 uppercase">Optimization</p>
                <p class="text-xs font-bold">9:16 Video</p>
            </div>
        </div>

        <div class="space-y-4">
            <a href="feed.html" class="nav-btn btn-primary shadow-lg shadow-pink-500/20">
                <i class="fa-solid fa-play"></i> Launch Public Feed
            </a>
            
            <a href="list.html" class="nav-btn btn-secondary shadow-lg shadow-blue-500/20">
                <i class="fa-solid fa-list-check"></i> Manage Inventory
            </a>
        </div>

        <p class="mt-8 text-gray-500 text-[11px]">
            Configure your Firebase Database via Admin Panel.<br>
            &copy; 2026 Sainiwalaa Influencer Network
        </p>
    </div>

    <div class="absolute top-[-10%] left-[-10%] w-64 h-64 bg-pink-600/20 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-64 h-64 bg-blue-600/20 rounded-full blur-[100px]"></div>

</body>
</html>
