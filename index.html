<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>Sainiwalaa | Official Reels Feed</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            background: #000; height: 100vh; width: 100vw; 
            overflow: hidden; color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #reels-feed {
            height: 100vh; width: 100%;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        #reels-feed::-webkit-scrollbar { display: none; }

        .reel-card {
            height: 100vh; width: 100%; scroll-snap-align: start;
            position: relative; background: #000;
            display: flex; align-items: center; justify-content: center;
        }

        video { height: 100%; width: 100%; object-fit: cover; }

        /* Overlays */
        .top-badge {
            position: absolute; top: 20px; left: 15px; z-index: 20;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            padding: 8px 15px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; gap: 8px;
        }

        .price-tag {
            position: absolute; top: 35%; right: 15px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            padding: 10px 15px; border-radius: 8px; font-weight: 900;
            transform: rotate(-8deg); z-index: 25; animation: bounce 2s infinite;
        }

        .info-box {
            position: absolute; bottom: 30px; left: 15px; right: 85px;
            background: #0095f6; padding: 18px; border-radius: 20px; z-index: 30;
        }

        .buy-btn {
            position: absolute; right: -65px; bottom: 0;
            background: #fff; color: #0095f6; width: 55px; height: 55px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px; box-shadow: 0 0 20px rgba(255,255,255,0.4); text-decoration: none;
        }

        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Play Button for First Time User */
        #start-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 150; display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="start-overlay" onclick="startApp()">
        <div class="text-center">
            <i class="fa-solid fa-circle-play text-7xl text-blue-500 mb-4"></i>
            <p class="font-bold tracking-widest">TAP TO WATCH REELS</p>
        </div>
    </div>

    <div id="loading-screen" style="display:none;">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
        <p class="mt-4 font-black italic text-blue-500">SAINIWALAA</p>
    </div>

    <div id="reels-feed"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function startApp() {
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';
            fetchReels();
        }

        async function fetchReels() {
            try {
                const snapshot = await db.ref('posts').once('value');
                const data = snapshot.val();
                if (!data) {
                    alert("No data found in Firebase!");
                    return;
                }

                const posts = Object.values(data).sort(() => Math.random() - 0.5);
                const container = document.getElementById('reels-feed');
                
                posts.forEach((post) => {
                    const card = `
                        <div class="reel-card" onclick="toggleMute(this)">
                            <div class="top-badge">
                                <i class="fa-brands fa-instagram text-pink-500 text-xl"></i>
                                <span class="font-bold text-sm">${post.influencerName || 'Sainiwalaa'}</span>
                            </div>

                            <div class="price-tag">
                                <div class="text-[10px] opacity-80 uppercase">Sale Price</div>
                                <div>₹${post.price}</div>
                                <div class="bg-white text-black text-[9px] px-2 rounded mt-1">${post.platform}</div>
                            </div>

                            <video class="main-video" loop playsinline muted preload="auto">
                                <source src="${post.mediaUrl}" type="video/mp4" />
                                Your browser does not support the video tag.
                            </video>

                            <div class="info-box">
                                <h2 class="font-bold text-lg uppercase tracking-tight">${post.productName}</h2>
                                <p class="text-xs opacity-90 mt-1 line-clamp-2">${post.description}</p>
                                <a href="${post.buyLink}" target="_blank" class="buy-btn" onclick="event.stopPropagation();">
                                    <i class="fa-solid fa-cart-shopping"></i>
                                </a>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });

                document.getElementById('loading-screen').style.display = 'none';
                initObserver();

            } catch (err) {
                alert("Firebase Error: " + err.message);
            }
        }

        function initObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.muted = false; // GitHub पर ऑटो-प्ले के लिए अनम्यूट जरूरी है
                        const playPromise = video.play();
                        if (playPromise !== undefined) {
                            playPromise.catch(error => {
                                console.log("Play blocked by browser, wait for user click.");
                            });
                        }
                    } else {
                        video.pause();
                    }
                });
            }, { threshold: 0.7 });

            document.querySelectorAll('.reel-card').forEach(card => observer.observe(card));
        }

        function toggleMute(card) {
            const video = card.querySelector('video');
            video.muted = !video.muted;
            if(video.paused) video.play();
        }
    </script>
</body>
</html>
