<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>Sainiwalaa Reels Feed</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            background: #000; height: 100vh; width: 100vw; 
            overflow: hidden; color: #fff; font-family: sans-serif;
        }

        #reels-feed {
            height: 100vh; width: 100%;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        #reels-feed::-webkit-scrollbar { display: none; }

        .reel-card {
            height: 100vh; width: 100%; scroll-snap-align: start;
            position: relative; background: #000;
            display: flex; align-items: center; justify-content: center;
        }

        video { height: 100%; width: 100%; object-fit: cover; }

        /* UI Elements */
        .top-info {
            position: absolute; top: 20px; left: 15px; z-index: 20;
            background: rgba(0,0,0,0.4); padding: 8px 15px; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2); font-size: 14px; font-weight: bold;
        }

        .price-badge {
            position: absolute; top: 35%; right: 15px;
            background: #ff416c; color: white; padding: 8px 12px;
            border-radius: 8px; font-weight: 900; transform: rotate(-8deg); z-index: 25;
        }

        .bottom-info-box {
            position: absolute; bottom: 30px; left: 15px; right: 85px;
            background: #0095f6; padding: 15px; border-radius: 15px; z-index: 30;
        }

        .buy-now-btn {
            position: absolute; right: -65px; bottom: 0;
            background: #fff; color: #0095f6; width: 55px; height: 55px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px; box-shadow: 0 0 15px rgba(255,255,255,0.3); text-decoration: none;
        }

        #tap-to-start {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 100; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="tap-to-start" onclick="startApp()">
        <i class="fa-solid fa-play text-6xl text-blue-500 mb-4"></i>
        <p class="font-bold tracking-widest">TAP TO WATCH REELS</p>
    </div>

    <div id="reels-feed"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function startApp() {
            document.getElementById('tap-to-start').style.display = 'none';
            fetchReels();
        }

        async function fetchReels() {
            db.ref('posts').once('value').then(snap => {
                const data = snap.val();
                if(!data) return;

                const posts = Object.values(data).sort(() => Math.random() - 0.5);
                const container = document.getElementById('reels-feed');

                posts.forEach(p => {
                    container.innerHTML += `
                        <div class="reel-card" onclick="toggleMute(this)">
                            <div class="top-info">👤 ${p.influencerName || 'Sainiwalaa'}</div>
                            <div class="price-badge">₹${p.price}</div>
                            
                            <video class="rvid" loop playsinline muted>
                                <source src="${p.mediaUrl}" type="video/mp4">
                            </video>

                            <div class="bottom-info-box">
                                <h3 class="font-bold text-lg">${p.productName}</h3>
                                <p class="text-xs opacity-90">${p.description}</p>
                                <a href="${p.buyLink}" target="_blank" class="buy-now-btn" onclick="event.stopPropagation();">🛒</a>
                            </div>
                        </div>`;
                });
                initObserver();
            });
        }

        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        v.muted = false; // ऑटो अनम्यूट
                        v.play().catch(() => {});
                    } else {
                        v.pause();
                    }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.reel-card').forEach(c => obs.observe(c));
        }

        function toggleMute(card) {
            const v = card.querySelector('video');
            v.muted = !v.muted;
            if(v.paused) v.play();
        }
    </script>
</body>
</html>
