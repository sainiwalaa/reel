<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sainiwalaa AI | Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
</head>
<body class="bg-black text-white h-screen flex items-center justify-center font-sans">
    <div class="w-full max-w-sm p-8 text-center bg-zinc-900 rounded-[40px] border border-zinc-800 shadow-2xl">
        <h1 class="text-4xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-pink-500 mb-2">SAINIWALAA</h1>
        <p class="text-zinc-500 text-[10px] tracking-[0.4em] uppercase mb-10">Influencer System</p>

        <div class="space-y-4">
            <a href="feed.html" class="block w-full p-5 bg-gradient-to-r from-pink-600 to-orange-500 rounded-2xl font-bold uppercase tracking-widest text-sm shadow-lg">
                <i class="fa-solid fa-play mr-2"></i> Watch Reels
            </a>

            <div id="authContent" class="pt-4 border-t border-zinc-800">
                <div id="loading" class="text-xs text-zinc-600">Checking system...</div>
                
                <div id="guestMode" class="hidden">
                    <a href="auth.html" class="block w-full p-5 bg-white text-black rounded-2xl font-bold uppercase text-sm">
                        <i class="fa-solid fa-lock mr-2"></i> Admin Login
                    </a>
                </div>

                <div id="adminMode" class="hidden">
                    <a href="list.html" class="block w-full p-5 bg-blue-600 text-white rounded-2xl font-bold uppercase text-sm mb-4">
                        <i class="fa-solid fa-plus mr-2"></i> Add/Manage Post
                    </a>
                    <button onclick="logout()" class="text-zinc-500 text-xs hover:text-red-500 transition">Logout Account</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc", authDomain: "sainiwalaainfulencer.firebaseapp.com" };
        firebase.initializeApp(firebaseConfig);
        firebase.auth().onAuthStateChanged(user => {
            document.getElementById('loading').classList.add('hidden');
            if(user) { document.getElementById('adminMode').classList.remove('hidden'); }
            else { document.getElementById('guestMode').classList.remove('hidden'); }
        });
        function logout() { firebase.auth().signOut().then(() => location.reload()); }
    </script>
</body>
</html>
