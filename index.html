<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>Sainiwalaa | Official Reels Feed</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            background: #000; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Full Screen Reel Container */
        #reels-feed {
            height: 100vh;
            width: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Firefox */
        }
        #reels-feed::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .reel-card {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            height: 100%;
            width: 100%;
            object-fit: cover;
            pointer-events: none; /* ताकि क्लिक इंटरफेयर न करे */
        }

        /* --- UI Overlays --- */
        
        /* Top Influencer Badge */
        .top-badge {
            position: absolute;
            top: 20px;
            left: 15px;
            z-index: 20;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Right Side Price Tag (Ads Style) */
        .price-tag {
            position: absolute;
            top: 35%;
            right: 15px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: 900;
            transform: rotate(-8deg);
            box-shadow: 0 5px 15px rgba(255, 65, 108, 0.5);
            z-index: 25;
            text-align: center;
            animation: bounce 2s infinite;
        }
        @keyframes bounce { 0%, 100% { transform: rotate(-8deg) scale(1); } 50% { transform: rotate(-8deg) scale(1.1); } }

        /* Bottom Product Info Box (Blue Theme) */
        .info-box {
            position: absolute;
            bottom: 30px;
            left: 15px;
            right: 85px;
            background: #0095f6; /* Your Requested Blue Color */
            padding: 18px;
            border-radius: 20px;
            z-index: 30;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .buy-btn {
            position: absolute;
            right: -65px;
            bottom: 0;
            background: #fff;
            color: #0095f6;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
            text-decoration: none;
            transition: 0.3s active;
        }

        /* Tap to Play Overlay */
        .tap-overlay {
            position: absolute;
            inset: 0;
            z-index: 15;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Loader */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .spinner { width: 50px; height: 50px; border: 4px solid #333; border-top: 4px solid #0095f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p class="mt-4 font-black italic tracking-widest text-blue-500">SAINIWALAA</p>
    </div>

    <div id="reels-feed">
        </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Fetch & Shuffle Algorithm
        async function fetchReels() {
            try {
                const snapshot = await db.ref('posts').once('value');
                const data = snapshot.val();
                if (!data) return;

                // Random Shuffle Algorithm
                const posts = Object.values(data).sort(() => Math.random() - 0.5);
                const container = document.getElementById('reels-feed');
                
                posts.forEach((post, index) => {
                    const card = `
                        <div class="reel-card" onclick="handleTap(this)">
                            <div class="top-badge">
                                <i class="fa-brands fa-instagram text-pink-500 text-xl"></i>
                                <span class="font-bold text-sm">${post.influencerName || 'Sainiwalaa'}</span>
                            </div>

                            <div class="price-tag">
                                <div class="text-[10px] opacity-80 uppercase">Sale Price</div>
                                <div>₹${post.price}</div>
                                <div class="bg-white text-black text-[9px] px-2 rounded mt-1">${post.platform}</div>
                            </div>

                            <video class="main-video" loop playsinline muted>
                                <source src="${post.mediaUrl}" type="video/mp4" />
                            </video>

                            <div class="tap-overlay">
                                <i class="fa-solid fa-play text-white opacity-0 text-5xl play-icon"></i>
                            </div>

                            <div class="info-box">
                                <h2 class="font-bold text-lg uppercase tracking-tight">${post.productName}</h2>
                                <p class="text-xs opacity-90 mt-1 line-clamp-2">${post.description}</p>
                                
                                <a href="${post.buyLink}" target="_blank" class="buy-btn" onclick="event.stopPropagation();">
                                    <i class="fa-solid fa-cart-shopping"></i>
                                </a>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });

                document.getElementById('loading-screen').style.display = 'none';
                initObserver();

            } catch (err) {
                console.error("Data Load Error:", err);
            }
        }

        // 2. Play Only One Video Algorithm
        function initObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.currentTime = 0;
                        video.play().catch(() => {});
                    } else {
                        video.pause();
                    }
                });
            }, { threshold: 0.8 });

            document.querySelectorAll('.reel-card').forEach(card => observer.observe(card));
        }

        // 3. Smart Tap Logic (Unmute & Play/Pause)
        function handleTap(card) {
            const video = card.querySelector('video');
            const playIcon = card.querySelector('.play-icon');

            if (video.muted) {
                // First tap unmutes everything
                document.querySelectorAll('video').forEach(v => v.muted = false);
            } else {
                // Subsequent taps play/pause
                if (video.paused) {
                    video.play();
                    playIcon.classList.replace('opacity-50', 'opacity-0');
                } else {
                    video.pause();
                    playIcon.classList.replace('opacity-0', 'opacity-50');
                }
            }
        }

        // Start App
        fetchReels();
    </script>
</body>
</html>
