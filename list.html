<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sainiwalaa | Product Listing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    <style>
        body { background: #f3f4f6; font-family: 'Inter', sans-serif; }
        .product-card { transition: transform 0.2s; border-left: 5px solid #0095f6; }
        .product-card:hover { transform: translateY(-3px); }
        .platform-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; font-weight: bold; }
        .amazon { background: #ff9900; color: white; }
        .meesho { background: #f43397; color: white; }
        .flipkart { background: #2874f0; color: white; }
        .myntra { background: #ff3f6c; color: white; }
        .other { background: #4b5563; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm">
            <div>
                <h1 class="text-2xl font-black text-gray-800 tracking-tight">🛒 PRODUCT LISTING</h1>
                <p class="text-gray-500 text-sm">Grow your product reach from here</p>
            </div>
            <a href="index.html" class="bg-gray-100 p-3 rounded-full hover:bg-gray-200 transition">
                <i class="fa-solid fa-house text-gray-600"></i>
            </a>
        </div>

        <div id="product-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div id="loader" class="col-span-full text-center py-20">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto"></div>
                <p class="mt-4 text-gray-400">Fetching your inventory...</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc", 
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Real-time Data Fetching
        db.ref('posts').on('value', (snap) => {
            const container = document.getElementById('product-container');
            const loader = document.getElementById('loader');
            const data = snap.val();

            if (!data) {
                container.innerHTML = '<p class="col-span-full text-center text-gray-500">No products found. Add some from the form!</p>';
                return;
            }

            loader.style.display = 'none';
            container.innerHTML = ""; // Clear existing

            Object.entries(data).forEach(([key, p]) => {
                const platformClass = (p.platform || 'other').toLowerCase();
                
                container.innerHTML += `
                <div class="product-card bg-white p-5 rounded-2xl shadow-sm flex gap-4 relative">
                    <div class="w-24 h-32 bg-gray-100 rounded-xl overflow-hidden flex-shrink-0 border">
                        <video src="${p.mediaUrl}" class="w-full h-full object-cover" muted onmouseover="this.play()" onmouseout="this.pause()"></video>
                    </div>

                    <div class="flex-1 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start">
                                <span class="platform-badge ${platformClass}">${p.platform || 'Other'}</span>
                                <span class="text-blue-600 font-black text-lg">₹${p.price}</span>
                            </div>
                            <h3 class="font-bold text-gray-800 text-lg mt-1 leading-tight">${p.productName}</h3>
                            <p class="text-xs text-gray-500 line-clamp-1 mt-1">${p.description}</p>
                        </div>

                        <div class="mt-3 pt-3 border-t border-gray-50 flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <div class="w-6 h-6 rounded-full bg-blue-100 flex items-center justify-center text-[10px] font-bold text-blue-600">
                                    ${(p.influencerName || 'S').charAt(0)}
                                </div>
                                <span class="text-xs font-medium text-gray-600">@${p.influencerInsta || 'unknown'}</span>
                            </div>
                            <a href="${p.buyLink}" target="_blank" class="text-blue-500 hover:text-blue-700">
                                <i class="fa-solid fa-arrow-up-right-from-square"></i>
                            </a>
                        </div>
                    </div>

                    <button onclick="deleteProduct('${key}')" class="absolute -top-2 -right-2 bg-red-100 text-red-500 w-8 h-8 rounded-full shadow-sm hover:bg-red-500 hover:text-white transition flex items-center justify-center border-2 border-white">
                        <i class="fa-solid fa-trash-can text-xs"></i>
                    </button>
                </div>`;
            });
        });

        // Delete Function
        function deleteProduct(id) {
            if(confirm("Are you sure you want to delete this product?")) {
                db.ref('posts/' + id).remove();
            }
        }
    </script>
</body>
</html>
