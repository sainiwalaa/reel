<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage | Sainiwalaa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-xl mx-auto bg-white p-6 rounded-3xl shadow-lg">
        <h2 class="text-xl font-bold mb-4">Add New Product</h2>
        <div class="space-y-3">
            <input type="text" id="infName" placeholder="Influencer Name" class="w-full p-3 border rounded-xl">
            <input type="text" id="pName" placeholder="Product Name" class="w-full p-3 border rounded-xl">
            <input type="text" id="mUrl" placeholder="Video URL (.mp4)" class="w-full p-3 border rounded-xl">
            <input type="number" id="prc" placeholder="Price (₹)" class="w-full p-3 border rounded-xl">
            <input type="text" id="lnk" placeholder="Buy Link" class="w-full p-3 border rounded-xl">
            <button onclick="add()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold">SEND TO FEED</button>
        </div>
        <hr class="my-6">
        <h2 class="font-bold mb-4">Manage Posts</h2>
        <div id="items" class="space-y-3"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc", databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        firebase.auth().onAuthStateChanged(user => { if(!user) location.href="auth.html"; });

        function add() {
            const data = {
                influencerName: document.getElementById('infName').value,
                productName: document.getElementById('pName').value,
                mediaUrl: document.getElementById('mUrl').value,
                price: document.getElementById('prc').value,
                buyLink: document.getElementById('lnk').value
            };
            db.ref('posts').push(data).then(() => location.reload());
        }

        db.ref('posts').on('value', snap => {
            const cont = document.getElementById('items'); cont.innerHTML = "";
            Object.entries(snap.val() || {}).forEach(([key, p]) => {
                cont.innerHTML += `<div class="p-3 bg-gray-50 rounded-xl flex justify-between items-center text-sm border">
                    <span>${p.productName} (₹${p.price})</span>
                    <button onclick="del('${key}')" class="text-red-500 font-bold">Delete</button>
                </div>`;
            });
        });
        function del(k) { if(confirm('Delete?')) db.ref('posts/'+k).remove(); }
    </script>
</body>
</html>
