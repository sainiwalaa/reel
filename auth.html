<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0 text-white">
    <title>Auth | Sainiwalaa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-zinc-900 p-8 rounded-3xl border border-zinc-800">
        <h2 id="title" class="text-2xl font-bold mb-6 text-center">Admin Login</h2>
        <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-4 bg-black border border-zinc-700 rounded-xl outline-none focus:border-pink-500">
        <input type="password" id="pass" placeholder="Password" class="w-full p-4 mb-6 bg-black border border-zinc-700 rounded-xl outline-none focus:border-pink-500">
        
        <button onclick="handleAuth()" id="btn" class="w-full bg-pink-600 p-4 rounded-xl font-bold mb-4">Login Now</button>
        <div class="flex justify-between text-xs text-zinc-500">
            <button onclick="toggle()">Create Account</button>
            <button onclick="reset()">Reset Password</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc", authDomain: "sainiwalaainfulencer.firebaseapp.com" };
        firebase.initializeApp(firebaseConfig);
        let isLogin = true;
        function toggle() { 
            isLogin = !isLogin; 
            document.getElementById('title').innerText = isLogin ? "Admin Login" : "Register Admin";
            document.getElementById('btn').innerText = isLogin ? "Login Now" : "Register Now";
        }
        function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(isLogin) firebase.auth().signInWithEmailAndPassword(e, p).then(() => location.href="index.html").catch(a => alert(a.message));
            else firebase.auth().createUserWithEmailAndPassword(e, p).then(() => alert("Success! Please Login.")).catch(a => alert(a.message));
        }
        function reset() { firebase.auth().sendPasswordResetEmail(document.getElementById('email').value).then(() => alert("Reset Link Sent!")); }
    </script>
</body>
</html>
